<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="-apple-system, 'Segoe UI', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#57606a"/></marker>
    <marker id="as" markerWidth="9" markerHeight="9" refX="2" refY="4.5" orient="auto"><path d="M9,0 L0,4.5 L9,9 z" fill="#57606a"/></marker>
  </defs>
  <rect x="0" y="0" width="760" height="300" rx="8" fill="#f6f8fa"/>

  <!-- メイン側 -->
  <rect x="20" y="46" width="210" height="210" rx="8" fill="#eef4fb" stroke="#0969da" stroke-width="1.5"/>
  <text x="125" y="70" text-anchor="middle" font-size="15" font-weight="700" fill="#0969da">メイン側</text>
  <rect x="45" y="108" width="160" height="84" rx="6" fill="#ffffff" stroke="#0969da" stroke-width="1.5"/>
  <text x="125" y="142" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2328">メイン 6809</text>
  <text x="125" y="166" text-anchor="middle" font-size="12.5" fill="#57606a">ゲームロジック (C)</text>

  <!-- 共有 RAM -->
  <rect x="300" y="118" width="160" height="66" rx="6" fill="#fff5e6" stroke="#9a6700" stroke-width="1.5"/>
  <text x="380" y="146" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2328">共有 RAM</text>
  <text x="380" y="167" text-anchor="middle" font-size="12" fill="#57606a">$FC80–$FCFF</text>

  <!-- サブシステム側 -->
  <rect x="530" y="26" width="210" height="250" rx="8" fill="#eafaef" stroke="#1a7f37" stroke-width="1.5"/>
  <text x="635" y="50" text-anchor="middle" font-size="15" font-weight="700" fill="#1a7f37">サブシステム側</text>
  <rect x="555" y="64" width="160" height="74" rx="6" fill="#ffffff" stroke="#1a7f37" stroke-width="1.5"/>
  <text x="635" y="95" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2328">サブ 6809</text>
  <text x="635" y="117" text-anchor="middle" font-size="12.5" fill="#57606a">描画エンジン</text>
  <rect x="555" y="178" width="160" height="74" rx="6" fill="#f3eefb" stroke="#8250df" stroke-width="1.5"/>
  <text x="635" y="209" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2328">VRAM</text>
  <text x="635" y="231" text-anchor="middle" font-size="12.5" fill="#57606a">B / R / G plane</text>

  <!-- arrows -->
  <line x1="205" y1="151" x2="300" y2="151" stroke="#57606a" stroke-width="1.8" marker-end="url(#ah)" marker-start="url(#as)"/>
  <text x="252" y="140" text-anchor="middle" font-size="11.5" fill="#57606a">HALT して</text>
  <text x="252" y="172" text-anchor="middle" font-size="11.5" fill="#57606a">受け渡し</text>
  <line x1="460" y1="145" x2="555" y2="110" stroke="#57606a" stroke-width="1.8" marker-end="url(#ah)" marker-start="url(#as)"/>
  <line x1="635" y1="138" x2="635" y2="178" stroke="#8250df" stroke-width="2" marker-end="url(#ah)"/>
  <text x="668" y="162" text-anchor="start" font-size="11.5" fill="#8250df">直書き</text>
</svg>
