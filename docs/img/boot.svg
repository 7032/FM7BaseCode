<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 130" font-family="-apple-system, 'Segoe UI', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif">
  <defs>
    <marker id="bah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#57606a"/></marker>
  </defs>
  <rect x="0" y="0" width="880" height="130" rx="8" fill="#f6f8fa"/>

  <!-- step boxes -->
  <g font-size="13" font-weight="700" fill="#1f2328">
    <rect x="20"  y="40" width="120" height="56" rx="6" fill="#ffffff" stroke="#57606a" stroke-width="1.5"/>
    <text x="80"  y="73" text-anchor="middle">電源 ON</text>

    <rect x="186" y="40" width="140" height="56" rx="6" fill="#fff5e6" stroke="#9a6700" stroke-width="1.5"/>
    <text x="256" y="66" text-anchor="middle">内蔵ブート ROM</text>
    <text x="256" y="85" text-anchor="middle" font-size="11" font-weight="400" fill="#57606a">$FE00–$FFFF</text>

    <rect x="372" y="40" width="150" height="56" rx="6" fill="#eef4fb" stroke="#0969da" stroke-width="1.5"/>
    <text x="447" y="66" text-anchor="middle">IPL</text>
    <text x="447" y="85" text-anchor="middle" font-size="11" font-weight="400" fill="#57606a">ディスク sector 1</text>

    <rect x="568" y="40" width="150" height="56" rx="6" fill="#eafaef" stroke="#1a7f37" stroke-width="1.5"/>
    <text x="643" y="66" text-anchor="middle">本体プログラム</text>
    <text x="643" y="85" text-anchor="middle" font-size="11" font-weight="400" fill="#57606a">$0400 (ORG)</text>

    <rect x="764" y="40" width="100" height="56" rx="6" fill="#f3eefb" stroke="#8250df" stroke-width="1.5"/>
    <text x="814" y="66" text-anchor="middle">main</text>
    <text x="814" y="85" text-anchor="middle" font-size="11" font-weight="400" fill="#57606a">ループ</text>
  </g>

  <!-- arrows -->
  <g stroke="#57606a" stroke-width="1.8" marker-end="url(#bah)">
    <line x1="140" y1="68" x2="186" y2="68"/>
    <line x1="326" y1="68" x2="372" y2="68"/>
    <line x1="522" y1="68" x2="568" y2="68"/>
    <line x1="718" y1="68" x2="764" y2="68"/>
  </g>
</svg>
